<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle with Deep Shadow -->
  <circle cx="60" cy="60" r="58" fill="url(#deepGradient)" stroke="url(#borderGradient)" stroke-width="4"/>
  <circle cx="60" cy="60" r="52" fill="url(#innerGradient)" opacity="0.8"/>
  
  <!-- Main Icon - Money/Ads Symbol -->
  <g transform="translate(20, 20)">
    <!-- Dollar Sign -->
    <path d="M40 15 L40 10 M40 70 L40 75 M30 20 L50 20 C55 20 55 30 50 30 L30 30 M30 30 L52 30 C57 30 57 40 52 40 L30 40 M25 25 L55 25 M25 35 L55 35" 
          stroke="url(#goldGradient)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    
    <!-- Ad Screen Frame -->
    <rect x="15" y="45" width="50" height="30" rx="4" fill="url(#screenGradient)" stroke="url(#goldGradient)" stroke-width="2"/>
    <rect x="18" y="48" width="44" height="24" rx="2" fill="url(#screenInner)"/>
    
    <!-- Play Button -->
    <polygon points="35,55 35,65 45,60" fill="url(#goldGradient)"/>
    
    <!-- Coins/Money with Gold -->
    <circle cx="25" cy="25" r="3" fill="url(#coinGradient)" stroke="url(#goldGradient)" stroke-width="1"/>
    <circle cx="55" cy="25" r="3" fill="url(#coinGradient)" stroke="url(#goldGradient)" stroke-width="1"/>
    <circle cx="40" cy="15" r="2" fill="url(#coinGradient)" stroke="url(#goldGradient)" stroke-width="1"/>
  </g>
  
  <!-- Developer Branding -->
  <text x="60" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="url(#goldGradient)">
    DEV
  </text>
  <text x="60" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="url(#goldGradient)" opacity="0.8">
    APPS DEVELOPER
  </text>
  
  <!-- Decorative Elements -->
  <g opacity="0.8">
    <circle cx="25" cy="25" r="2" fill="url(#goldGradient)"/>
    <circle cx="95" cy="25" r="2" fill="url(#goldGradient)"/>
    <circle cx="25" cy="95" r="2" fill="url(#goldGradient)"/>
    <circle cx="95" cy="95" r="2" fill="url(#goldGradient)"/>
  </g>
  
  <!-- Gradient Definitions -->
  <defs>
    <!-- Deep Background Gradient (Dark Blue to Black) -->
    <linearGradient id="deepGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#1E293B;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#0F172A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#020617;stop-opacity:1" />
    </linearGradient>
    
    <!-- Inner Gradient (Deep Blue) -->
    <linearGradient id="innerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E40AF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1D4ED8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F172A;stop-opacity:1" />
    </linearGradient>
    
    <!-- Gold Gradient (Binance-style) -->
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FCD34D;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#D97706;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#92400E;stop-opacity:1" />
    </linearGradient>
    
    <!-- Border Gradient -->
    <linearGradient id="borderGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#D97706;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#92400E;stop-opacity:1" />
    </linearGradient>
    
    <!-- Screen Gradient -->
    <linearGradient id="screenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1F2937;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#111827;stop-opacity:0.9" />
    </linearGradient>
    
    <!-- Screen Inner -->
    <linearGradient id="screenInner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#374151;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#1F2937;stop-opacity:0.8" />
    </linearGradient>
    
    <!-- Coin Gradient -->
    <radialGradient id="coinGradient" cx="50%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#FCD34D;stop-opacity:0.8" />
      <stop offset="70%" style="stop-color:#F59E0B;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#D97706;stop-opacity:0.4" />
    </radialGradient>
  </defs>
</svg>
